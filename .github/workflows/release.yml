name: Build Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Check if release already exists
        run: |
          if gh release view "${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "::error::Release ${{ steps.version.outputs.version }} already exists. Update the version in package.json first."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create zip
        run: |
          zip -r "com.mugisennin.object-labels-${{ steps.version.outputs.version }}.zip" . \
            -x ".git/*" ".github/*"

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            "com.mugisennin.object-labels-${{ steps.version.outputs.version }}.zip" \
            "package.json"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
